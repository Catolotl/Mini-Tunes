<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUNED — Music Discovery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --accent: #ff3d00;
    --accent2: #ff8a00;
    --text: #f0ede8;
    --muted: #555555;
    --dim: #333333;
    --radius: 2px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.12em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--muted);
    -webkit-text-fill-color: var(--muted);
    display: block;
    margin-top: -6px;
  }

  .instance-select {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .instance-select select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 6px 10px;
    border-radius: var(--radius);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .instance-select select:hover { border-color: var(--accent); }

  /* SEARCH */
  .search-bar {
    padding: 24px 32px;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 12px 18px;
    outline: none;
    border-radius: var(--radius) 0 0 var(--radius);
    transition: border-color 0.2s;
    letter-spacing: 0.04em;
  }

  .search-bar input::placeholder { color: var(--muted); }
  .search-bar input:focus { border-color: var(--accent); }

  .search-bar button {
    background: var(--accent);
    border: 1px solid var(--accent);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    padding: 12px 28px;
    cursor: pointer;
    border-radius: 0 var(--radius) var(--radius) 0;
    transition: background 0.2s, opacity 0.2s;
  }

  .search-bar button:hover { opacity: 0.85; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px 20px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }

  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    flex: 1;
    min-height: 0;
  }

  /* RESULTS */
  .results {
    padding: 24px 32px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  .results-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    color: var(--text);
  }

  .results-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* TRACK CARD */
  .track-list { display: flex; flex-direction: column; gap: 2px; }

  .track-card {
    display: grid;
    grid-template-columns: 48px 72px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }

  .track-card:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .track-card.playing {
    background: var(--surface2);
    border-color: var(--accent);
  }

  .track-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.05em;
  }

  .track-card.playing .track-num { color: var(--accent); }

  .track-thumb {
    width: 72px;
    height: 48px;
    object-fit: cover;
    border-radius: 1px;
    background: var(--surface2);
  }

  .thumb-placeholder {
    width: 72px;
    height: 48px;
    background: var(--surface2);
    border-radius: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    font-size: 1.2rem;
  }

  .track-info { min-width: 0; }

  .track-name {
    font-size: 0.85rem;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
    letter-spacing: 0.01em;
  }

  .track-card.playing .track-name { color: var(--accent); }

  .track-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.04em;
  }

  .track-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
  }

  /* SIDEBAR / PLAYER PANEL */
  .sidebar {
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  .now-playing-art {
    position: relative;
    padding-top: 100%;
    background: var(--surface2);
    overflow: hidden;
  }

  .now-playing-art img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.4s;
  }

  .art-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(17,17,17,0.9) 0%, transparent 60%);
  }

  .art-label {
    position: absolute;
    bottom: 14px;
    left: 16px;
    right: 16px;
    z-index: 1;
  }

  .art-label .track-title-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.06em;
    line-height: 1.1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  }

  .art-label .track-artist-big {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .art-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    gap: 10px;
  }

  .art-placeholder .icon { font-size: 3rem; }
  .art-placeholder p {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  /* PLAYER CONTROLS */
  .player-controls {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  /* Progress */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .time-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    min-width: 32px;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s linear;
  }

  /* Controls row */
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 6px;
    transition: color 0.15s, transform 0.1s;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ctrl-btn:hover { color: var(--text); transform: scale(1.1); }

  .ctrl-btn.primary {
    background: var(--accent);
    color: #fff;
    width: 44px;
    height: 44px;
    font-size: 1.1rem;
    transition: background 0.15s, transform 0.1s;
  }

  .ctrl-btn.primary:hover { background: var(--accent2); transform: scale(1.05); }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }

  .volume-icon {
    font-size: 0.85rem;
    color: var(--muted);
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    background: var(--border);
    height: 3px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    background: var(--text);
    border-radius: 50%;
    transition: background 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover { background: var(--accent); }

  /* QUEUE */
  .queue-section { padding: 14px 16px; flex: 1; overflow-y: auto; }

  .queue-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .queue-item {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 10px;
    align-items: center;
    padding: 7px 6px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }

  .queue-item:hover { background: var(--surface2); border-color: var(--border); }
  .queue-item.active { background: var(--surface2); border-color: var(--accent); }

  .queue-thumb {
    width: 36px;
    height: 24px;
    object-fit: cover;
    border-radius: 1px;
    background: var(--surface2);
  }

  .queue-name {
    font-size: 0.75rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .queue-item.active .queue-name { color: var(--accent); }

  .queue-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* STATUS BAR */
  .status {
    padding: 8px 32px;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .status .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--dim);
    margin-right: 6px;
    transition: background 0.3s;
  }

  .status .dot.live { background: #00e676; box-shadow: 0 0 6px #00e676; }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--muted);
    gap: 14px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
  }

  /* EMPTY */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--muted);
    gap: 10px;
  }

  .empty .empty-icon { font-size: 3rem; opacity: 0.3; }
  .empty p {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-align: center;
  }

  /* TREND CHIPS */
  .trend-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover {
    color: var(--text);
    border-color: var(--accent);
    background: rgba(255,61,0,0.08);
  }

  /* ERROR */
  .error-msg {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(255,61,0,0.08);
    border: 1px solid rgba(255,61,0,0.3);
    padding: 10px 14px;
    border-radius: var(--radius);
    letter-spacing: 0.06em;
    margin: 12px 0;
  }

  /* Animations */
  .track-card {
    animation: fadeIn 0.2s ease backwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }

  .track-card:nth-child(1) { animation-delay: 0.02s; }
  .track-card:nth-child(2) { animation-delay: 0.04s; }
  .track-card:nth-child(3) { animation-delay: 0.06s; }
  .track-card:nth-child(4) { animation-delay: 0.08s; }
  .track-card:nth-child(5) { animation-delay: 0.10s; }
  .track-card:nth-child(6) { animation-delay: 0.12s; }
  .track-card:nth-child(7) { animation-delay: 0.14s; }
  .track-card:nth-child(8) { animation-delay: 0.16s; }

  /* Hidden audio */
  audio { display: none; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    TUNED
    <span>PIPED AUDIO EXPLORER</span>
  </div>
  <div class="instance-select">
    <span>INSTANCE</span>
    <select id="instanceSelect">
      <option value="https://pipedapi.kavin.rocks">pipedapi.kavin.rocks</option>
      <option value="https://piped-api.garudalinux.org">garudalinux.org</option>
      <option value="https://piped.video/api">piped.video</option>
      <option value="https://api.piped.projectsegfau.lt">projectsegfau.lt</option>
    </select>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="SEARCH ARTISTS, TRACKS, ALBUMS..." autocomplete="off" spellcheck="false">
  <button id="searchBtn">SEARCH</button>
</div>

<div class="trend-chips" id="trendChips">
  <span class="chip" onclick="doSearch('lofi hip hop')">lofi hip hop</span>
  <span class="chip" onclick="doSearch('jazz classics')">jazz classics</span>
  <span class="chip" onclick="doSearch('ambient electronic')">ambient electronic</span>
  <span class="chip" onclick="doSearch('indie folk 2024')">indie folk 2024</span>
  <span class="chip" onclick="doSearch('synthwave')">synthwave</span>
  <span class="chip" onclick="doSearch('classical piano')">classical piano</span>
  <span class="chip" onclick="doSearch('soul R&B')">soul R&B</span>
  <span class="chip" onclick="doSearch('drum and bass')">drum & bass</span>
</div>

<div class="tabs">
  <div class="tab active" id="tabAll" onclick="switchTab('all')">ALL</div>
  <div class="tab" id="tabVideos" onclick="switchTab('videos')">VIDEOS</div>
  <div class="tab" id="tabChannels" onclick="switchTab('channels')">CHANNELS</div>
</div>

<div class="main">
  <div class="results" id="results">
    <div class="empty">
      <div class="empty-icon">🎵</div>
      <p>SEARCH FOR MUSIC ABOVE</p>
      <p style="opacity:0.5; font-size:0.6rem; margin-top:4px;">OR TAP A CHIP TO EXPLORE</p>
    </div>
  </div>

  <div class="sidebar">
    <div class="now-playing-art" id="artWrap">
      <div class="art-placeholder">
        <div class="icon">🎧</div>
        <p>NOTHING PLAYING</p>
      </div>
    </div>

    <div class="player-controls">
      <div class="progress-wrap">
        <span class="time-label" id="timeCurrent">0:00</span>
        <div class="progress-bar" id="progressBar" onclick="seekTo(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time-label" id="timeTotal" style="text-align:right">0:00</span>
      </div>

      <div class="controls-row">
        <button class="ctrl-btn" onclick="prevTrack()" title="Previous">⏮</button>
        <button class="ctrl-btn" onclick="skipBack()" title="-10s">⏪</button>
        <button class="ctrl-btn primary" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="skipFwd()" title="+10s">⏩</button>
        <button class="ctrl-btn" onclick="nextTrack()" title="Next">⏭</button>
      </div>

      <div class="volume-row">
        <span class="volume-icon">🔈</span>
        <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
        <span class="volume-icon">🔊</span>
      </div>
    </div>

    <div class="queue-section">
      <div class="queue-label">QUEUE</div>
      <div id="queueList"></div>
    </div>
  </div>
</div>

<div class="status">
  <span><span class="dot" id="statusDot"></span><span id="statusText">IDLE</span></span>
  <span id="statusRight">TUNED v1.0</span>
</div>

<audio id="audioEl"></audio>

<script>
  const INSTANCES = {
    'https://pipedapi.kavin.rocks': 'https://pipedapi.kavin.rocks',
    'https://piped-api.garudalinux.org': 'https://piped-api.garudalinux.org',
    'https://piped.video/api': 'https://piped.video/api',
    'https://api.piped.projectsegfau.lt': 'https://api.piped.projectsegfau.lt',
  };

  let currentInstance = 'https://pipedapi.kavin.rocks';
  let allResults = [];
  let queue = [];
  let currentIdx = -1;
  let currentTab = 'all';
  let lastQuery = '';

  const audio = document.getElementById('audioEl');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const statusRight = document.getElementById('statusRight');

  document.getElementById('instanceSelect').addEventListener('change', e => {
    currentInstance = e.target.value;
    setStatus('INSTANCE CHANGED');
    if (lastQuery) doSearch(lastQuery);
  });

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') triggerSearch();
  });

  document.getElementById('searchBtn').addEventListener('click', triggerSearch);

  function triggerSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (q) doSearch(q);
  }

  function switchTab(tab) {
    currentTab = tab;
    ['all','videos','channels'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))
        ?.classList.toggle('active', t === tab);
    });
    renderResults(allResults);
  }

  async function doSearch(query) {
    lastQuery = query;
    document.getElementById('searchInput').value = query;
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = `<div class="loading"><div class="spinner"></div><p>SEARCHING "${query.toUpperCase()}"</p></div>`;
    setStatus('SEARCHING...', true);

    try {
      const url = `${currentInstance}/search?q=${encodeURIComponent(query)}&filter=all`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allResults = data.items || [];
      setStatus(`${allResults.length} RESULTS`, false);
      renderResults(allResults);
    } catch(e) {
      resultsEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>
        <div class="error-msg">FETCH ERROR: ${e.message}<br>Try another instance.</div>
        <p style="margin-top:8px">Some instances block browser requests (CORS).<br>Try switching the instance above.</p></div>`;
      setStatus('ERROR', false);
    }
  }

  function renderResults(items) {
    const resultsEl = document.getElementById('results');
    let filtered = items;
    if (currentTab === 'videos') filtered = items.filter(i => i.type === 'stream');
    else if (currentTab === 'channels') filtered = items.filter(i => i.type === 'channel');

    if (filtered.length === 0) {
      resultsEl.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>NO RESULTS</p></div>`;
      return;
    }

    const streams = filtered.filter(i => i.type === 'stream');
    queue = streams;

    let html = `<div class="results-header">
      <span class="results-title">${currentTab === 'channels' ? 'CHANNELS' : 'TRACKS'}</span>
      <span class="results-count">${filtered.length} FOUND</span>
    </div><div class="track-list">`;

    filtered.forEach((item, idx) => {
      if (item.type === 'stream') {
        const streamIdx = streams.indexOf(item);
        const thumb = item.thumbnail || '';
        const dur = formatDuration(item.duration);
        const views = formatViews(item.views);
        html += `<div class="track-card${streamIdx === currentIdx ? ' playing' : ''}" 
          onclick="playFromSearch(${streamIdx})" 
          style="animation-delay:${idx * 0.02}s">
          <span class="track-num">${streamIdx + 1}</span>
          ${thumb ? `<img class="track-thumb" src="${thumb}" loading="lazy" onerror="this.style.display='none'">` 
                  : `<div class="thumb-placeholder">♪</div>`}
          <div class="track-info">
            <div class="track-name">${escHtml(item.title)}</div>
            <div class="track-artist">${escHtml(item.uploaderName || '')}</div>
          </div>
          <div class="track-meta">${dur}<br><span style="font-size:0.55rem;opacity:0.6">${views}</span></div>
        </div>`;
      } else if (item.type === 'channel') {
        const thumb = item.thumbnail || '';
        html += `<div class="track-card" onclick="searchChannel('${escHtml(item.url)}', '${escHtml(item.name)}')" style="animation-delay:${idx*0.02}s">
          <span class="track-num">CH</span>
          ${thumb ? `<img class="track-thumb" src="${thumb}" loading="lazy" style="border-radius:50%;width:48px;height:48px" onerror="this.style.display='none'">` 
                  : `<div class="thumb-placeholder">👤</div>`}
          <div class="track-info">
            <div class="track-name">${escHtml(item.name)}</div>
            <div class="track-artist">CHANNEL · ${formatViews(item.subscribers)} SUBS</div>
          </div>
          <div class="track-meta" style="color:var(--accent)">→</div>
        </div>`;
      }
    });

    html += '</div>';
    resultsEl.innerHTML = html;
    updateQueueUI();
  }

  async function searchChannel(url, name) {
    setStatus(`LOADING ${name.toUpperCase()}...`, true);
    try {
      const channelId = url.replace('/channel/', '');
      const res = await fetch(`${currentInstance}/channel/${channelId}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const vids = (data.relatedStreams || []).map(v => ({ ...v, type: 'stream', uploaderName: name }));
      allResults = vids;
      queue = vids;
      setStatus(`${vids.length} FROM ${name.toUpperCase()}`, false);
      renderResults(vids);
    } catch(e) {
      setStatus('ERROR: ' + e.message, false);
    }
  }

  function playFromSearch(queueIdx) {
    currentIdx = queueIdx;
    loadAndPlay(queue[queueIdx]);
    updateQueueUI();
  }

  async function loadAndPlay(item) {
    if (!item) return;
    const videoId = item.url?.replace('/watch?v=', '') || item.videoId || '';
    setStatus(`LOADING: ${item.title?.toUpperCase()?.slice(0,30)}...`, true);

    try {
      const res = await fetch(`${currentInstance}/streams/${videoId}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // Get best audio stream
      const audioStreams = (data.audioStreams || []).sort((a,b) => (b.bitrate||0) - (a.bitrate||0));
      const best = audioStreams[0];

      if (!best?.url) throw new Error('No audio stream found');

      audio.src = best.url;
      audio.volume = parseFloat(document.getElementById('volSlider').value);
      audio.play();

      setStatus(`PLAYING: ${item.title?.slice(0,40)}`, true);
      document.getElementById('playPauseBtn').textContent = '⏸';

      // Update now playing UI
      const artHtml = data.thumbnailUrl 
        ? `<img src="${data.thumbnailUrl}" alt="">
           <div class="art-overlay"></div>
           <div class="art-label">
             <div class="track-title-big">${escHtml(data.title || item.title)}</div>
             <div class="track-artist-big">${escHtml(data.uploader || item.uploaderName || '')}</div>
           </div>`
        : `<div class="art-placeholder"><div class="icon">🎧</div><p>${escHtml((item.title||'').slice(0,30))}</p></div>`;

      document.getElementById('artWrap').innerHTML = artHtml;
      document.title = `${item.title} — TUNED`;
      updateQueueUI();
      statusDot.classList.add('live');
    } catch(e) {
      setStatus('STREAM ERROR: ' + e.message, false);
      statusDot.classList.remove('live');
    }
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      document.getElementById('playPauseBtn').textContent = '⏸';
      statusDot.classList.add('live');
    } else {
      audio.pause();
      document.getElementById('playPauseBtn').textContent = '▶';
      statusDot.classList.remove('live');
    }
  }

  function prevTrack() {
    if (currentIdx > 0) { currentIdx--; loadAndPlay(queue[currentIdx]); updateQueueUI(); }
  }

  function nextTrack() {
    if (currentIdx < queue.length - 1) { currentIdx++; loadAndPlay(queue[currentIdx]); updateQueueUI(); }
  }

  function skipBack() { audio.currentTime = Math.max(0, audio.currentTime - 10); }
  function skipFwd() { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); }
  function setVolume(v) { audio.volume = parseFloat(v); }

  function seekTo(e) {
    if (!audio.duration) return;
    const bar = document.getElementById('progressBar');
    const rect = bar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('timeCurrent').textContent = formatDuration(Math.floor(audio.currentTime));
    document.getElementById('timeTotal').textContent = formatDuration(Math.floor(audio.duration));
  });

  audio.addEventListener('ended', nextTrack);
  audio.addEventListener('play', () => {
    document.getElementById('playPauseBtn').textContent = '⏸';
    statusDot.classList.add('live');
  });
  audio.addEventListener('pause', () => {
    document.getElementById('playPauseBtn').textContent = '▶';
    statusDot.classList.remove('live');
  });
  audio.addEventListener('error', () => {
    setStatus('AUDIO ERROR — STREAM UNAVAILABLE', false);
    statusDot.classList.remove('live');
  });

  function updateQueueUI() {
    const queueEl = document.getElementById('queueList');
    if (!queue.length) { queueEl.innerHTML = '<p style="color:var(--muted);font-family:DM Mono,monospace;font-size:0.6rem;letter-spacing:0.1em">EMPTY</p>'; return; }
    queueEl.innerHTML = queue.map((item, i) => {
      const thumb = item.thumbnail || '';
      return `<div class="queue-item${i === currentIdx ? ' active' : ''}" onclick="playFromSearch(${i})">
        ${thumb ? `<img class="queue-thumb" src="${thumb}" loading="lazy" onerror="this.style.display='none'">` 
                : `<div style="width:36px;height:24px;background:var(--surface2);border-radius:1px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:0.7rem">♪</div>`}
        <div style="min-width:0">
          <div class="queue-name">${escHtml(item.title || '')}</div>
          <div class="queue-artist">${escHtml(item.uploaderName || '')}</div>
        </div>
      </div>`;
    }).join('');
  }

  function setStatus(msg, active = false) {
    statusText.textContent = msg;
    statusDot.classList.toggle('live', active);
    statusRight.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }

  function formatDuration(secs) {
    if (!secs || isNaN(secs)) return '0:00';
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${m}:${s.toString().padStart(2,'0')}`;
  }

  function formatViews(n) {
    if (!n) return '';
    if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
    return n.toString();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
