<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUNED — Music Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --accent: #ff3d00;
    --accent2: #ff8a00;
    --text: #f0ede8;
    --muted: #4a4a4a;
    --dim: #2a2a2a;
    --green: #00e676;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* grain */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.5;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.96);
    backdrop-filter: blur(16px);
    z-index: 50;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem;
    letter-spacing: 0.14em;
    background: linear-gradient(100deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.22em;
    color: var(--muted);
    -webkit-text-fill-color: var(--muted);
    margin-top: 2px;
  }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }

  .instance-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 3px; padding: 5px 10px;
  }

  .instance-pill label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.16em;
    color: var(--muted); text-transform: uppercase;
  }

  .instance-pill select {
    background: transparent; border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    outline: none; cursor: pointer; letter-spacing: 0.04em;
  }

  .instance-pill select option { background: var(--surface2); }

  /* ── SEARCH ── */
  .search-wrap {
    flex-shrink: 0;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }

  .search-row {
    display: flex; gap: 0;
  }

  .search-row input {
    flex: 1;
    background: var(--surface); border: 1px solid var(--border2);
    border-right: none;
    color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    padding: 10px 16px; outline: none;
    border-radius: 3px 0 0 3px;
    letter-spacing: 0.04em; transition: border-color 0.18s;
  }

  .search-row input::placeholder { color: var(--muted); }
  .search-row input:focus { border-color: var(--accent); }

  .search-row button {
    background: var(--accent); border: 1px solid var(--accent);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem;
    letter-spacing: 0.18em; padding: 10px 24px;
    cursor: pointer; border-radius: 0 3px 3px 0;
    transition: opacity 0.15s;
  }

  .search-row button:hover { opacity: 0.82; }

  .chips {
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .chip {
    font-family: 'DM Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.08em; padding: 4px 11px;
    background: transparent; border: 1px solid var(--border2);
    border-radius: 20px; cursor: pointer; color: var(--muted);
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    white-space: nowrap;
  }

  .chip:hover {
    color: var(--text); border-color: var(--accent);
    background: rgba(255,61,0,0.07);
  }

  /* ── BODY LAYOUT ── */
  .body {
    flex: 1; display: grid;
    grid-template-columns: 1fr 320px;
    min-height: 0;
  }

  /* ── RESULTS PANE ── */
  .results-pane {
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  .results-pane::-webkit-scrollbar { width: 4px; }
  .results-pane::-webkit-scrollbar-track { background: transparent; }
  .results-pane::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .pane-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 24px 10px;
    position: sticky; top: 0;
    background: rgba(10,10,10,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border); z-index: 10;
  }

  .pane-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 0.1em;
  }

  .pane-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em;
  }

  .track-list { padding: 6px 12px 20px; display: flex; flex-direction: column; gap: 1px; }

  .track-card {
    display: grid;
    grid-template-columns: 38px 80px 1fr auto;
    align-items: center; gap: 12px;
    padding: 8px 12px;
    border-radius: 3px; cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.12s, border-color 0.12s;
    animation: slideIn 0.22s ease backwards;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: none; }
  }

  .track-card:hover { background: var(--surface); border-color: var(--border2); }
  .track-card.playing { background: var(--surface2); border-color: var(--accent) !important; }

  .t-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; color: var(--muted);
    text-align: right; letter-spacing: 0.04em;
  }
  .track-card.playing .t-num { color: var(--accent); }

  .t-thumb {
    width: 80px; height: 45px;
    object-fit: cover; border-radius: 2px;
    background: var(--surface2);
    display: block;
  }

  .t-thumb-ph {
    width: 80px; height: 45px;
    background: var(--surface2); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 1rem;
  }

  .t-info { min-width: 0; }

  .t-name {
    font-size: 0.82rem; font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.01em;
  }
  .track-card.playing .t-name { color: var(--accent); }

  .t-author {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.04em; margin-top: 3px;
  }

  .t-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; color: var(--muted);
    text-align: right; white-space: nowrap;
  }

  /* empty / loading states */
  .state-center {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 24px; gap: 12px; color: var(--muted);
    text-align: center;
  }

  .state-icon { font-size: 2.6rem; opacity: 0.35; }

  .state-center p {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.12em;
    line-height: 1.7;
  }

  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err-box {
    background: rgba(255,61,0,0.07);
    border: 1px solid rgba(255,61,0,0.25);
    border-radius: 3px; padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; color: var(--accent);
    letter-spacing: 0.05em; line-height: 1.6;
    margin: 0 24px;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    display: flex; flex-direction: column;
    background: var(--surface); overflow: hidden;
  }

  /* art */
  .art-wrap {
    position: relative; width: 100%; padding-top: 56.25%;
    background: var(--surface2); overflow: hidden; flex-shrink: 0;
  }

  .art-wrap img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    transition: opacity 0.5s;
  }

  .art-grad {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(17,17,17,0.95) 0%, rgba(17,17,17,0.1) 55%);
  }

  .art-text {
    position: absolute; bottom: 12px; left: 14px; right: 14px; z-index: 2;
  }

  .art-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.45rem; letter-spacing: 0.07em;
    line-height: 1.1; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }

  .art-author {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; color: var(--accent2);
    letter-spacing: 0.12em; margin-top: 4px;
  }

  .art-ph {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
  }

  .art-ph span { font-size: 2.5rem; opacity: 0.2; }
  .art-ph p {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.18em; color: var(--muted);
  }

  /* controls */
  .controls {
    padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }

  .prog-wrap {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  }

  .time {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; color: var(--muted);
    letter-spacing: 0.03em; min-width: 30px;
  }
  .time.right { text-align: right; }

  .prog-track {
    flex: 1; height: 3px; background: var(--dim);
    border-radius: 2px; cursor: pointer; position: relative;
  }

  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px; width: 0%;
    transition: width 0.5s linear;
  }

  .btns {
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }

  .btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.95rem;
    padding: 7px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.12s, transform 0.1s;
  }

  .btn:hover { color: var(--text); transform: scale(1.12); }

  .btn.play {
    background: var(--accent); color: #fff;
    width: 42px; height: 42px; font-size: 1rem;
    transition: background 0.15s, transform 0.1s;
  }

  .btn.play:hover { background: var(--accent2); transform: scale(1.06); }

  .vol-row {
    display: flex; align-items: center; gap: 8px; margin-top: 10px;
  }

  .vol-icon { font-size: 0.75rem; color: var(--muted); }

  input[type=range] {
    flex: 1; -webkit-appearance: none;
    background: var(--dim); height: 3px;
    border-radius: 2px; outline: none; cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    background: var(--text); border-radius: 50%;
    transition: background 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover { background: var(--accent); }

  /* queue */
  .queue-wrap {
    flex: 1; overflow-y: auto; padding: 10px 10px 16px;
  }

  .queue-wrap::-webkit-scrollbar { width: 3px; }
  .queue-wrap::-webkit-scrollbar-track { background: transparent; }
  .queue-wrap::-webkit-scrollbar-thumb { background: var(--dim); }

  .queue-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.22em;
    color: var(--muted); text-transform: uppercase;
    padding: 2px 6px 8px;
  }

  .q-item {
    display: grid; grid-template-columns: 40px 1fr;
    gap: 8px; align-items: center;
    padding: 5px 6px; border-radius: 3px;
    cursor: pointer; border: 1px solid transparent;
    transition: background 0.1s;
  }

  .q-item:hover { background: var(--surface2); border-color: var(--border2); }
  .q-item.active { background: var(--surface2); border-color: rgba(255,61,0,0.4); }

  .q-thumb {
    width: 40px; height: 24px;
    object-fit: cover; border-radius: 1px;
    background: var(--surface2);
  }

  .q-thumb-ph {
    width: 40px; height: 24px;
    background: var(--dim); border-radius: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem; color: var(--muted);
  }

  .q-name {
    font-size: 0.72rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .q-item.active .q-name { color: var(--accent); }

  .q-author {
    font-family: 'DM Mono', monospace;
    font-size: 0.56rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* status bar */
  .statusbar {
    flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em;
  }

  .dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--dim);
    margin-right: 7px; vertical-align: middle;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .dot.live { background: var(--green); box-shadow: 0 0 5px var(--green); }

  audio { display: none; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo">TUNED</div>
    <div class="logo-sub">INVIDIOUS MUSIC EXPLORER</div>
  </div>
  <div class="header-right">
    <div class="instance-pill">
      <label>INSTANCE</label>
      <select id="instanceSel">
        <option value="https://iv.melmac.space">iv.melmac.space</option>
        <option value="https://inv.nadeko.net">inv.nadeko.net</option>
        <option value="https://invidious.privacydev.net">privacydev.net</option>
        <option value="https://yt.cdaut.de">yt.cdaut.de</option>
        <option value="https://invidious.lunar.icu">lunar.icu</option>
        <option value="https://invidious.fdn.fr">invidious.fdn.fr</option>
      </select>
    </div>
  </div>
</header>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-row">
    <input id="q" type="text" placeholder="SEARCH TRACKS, ARTISTS, ALBUMS..." spellcheck="false" autocomplete="off">
    <button onclick="triggerSearch()">SEARCH</button>
  </div>
  <div class="chips">
    <span class="chip" onclick="doSearch('lofi hip hop mix')">lofi hip hop</span>
    <span class="chip" onclick="doSearch('jazz classics playlist')">jazz classics</span>
    <span class="chip" onclick="doSearch('ambient electronic')">ambient</span>
    <span class="chip" onclick="doSearch('synthwave best')">synthwave</span>
    <span class="chip" onclick="doSearch('classical piano')">classical piano</span>
    <span class="chip" onclick="doSearch('soul R&B 2024')">soul & R&B</span>
    <span class="chip" onclick="doSearch('drum and bass mix')">drum & bass</span>
    <span class="chip" onclick="doSearch('indie folk acoustic')">indie folk</span>
    <span class="chip" onclick="doSearch('metal playlist')">metal</span>
  </div>
</div>

<!-- BODY -->
<div class="body">

  <!-- RESULTS -->
  <div class="results-pane" id="resultsPane">
    <div class="state-center">
      <div class="state-icon">🎵</div>
      <p>SEARCH FOR MUSIC ABOVE<br><span style="opacity:0.5;font-size:0.58rem">OR TAP A GENRE CHIP TO EXPLORE</span></p>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- Art -->
    <div class="art-wrap" id="artWrap">
      <div class="art-ph">
        <span>🎧</span>
        <p>NOTHING PLAYING</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="prog-wrap">
        <span class="time" id="tCur">0:00</span>
        <div class="prog-track" id="progTrack" onclick="seek(event)">
          <div class="prog-fill" id="progFill"></div>
        </div>
        <span class="time right" id="tTot">0:00</span>
      </div>
      <div class="btns">
        <button class="btn" onclick="prevTrack()" title="Prev">⏮</button>
        <button class="btn" onclick="skip(-10)" title="-10s">⏪</button>
        <button class="btn play" id="ppBtn" onclick="togglePlay()">▶</button>
        <button class="btn" onclick="skip(10)" title="+10s">⏩</button>
        <button class="btn" onclick="nextTrack()" title="Next">⏭</button>
      </div>
      <div class="vol-row">
        <span class="vol-icon">🔈</span>
        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.85" oninput="setVol(this.value)">
        <span class="vol-icon">🔊</span>
      </div>
    </div>

    <!-- Queue -->
    <div class="queue-wrap">
      <div class="queue-label">QUEUE</div>
      <div id="queueList"><p style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted);padding:4px 6px;letter-spacing:0.1em">EMPTY</p></div>
    </div>
  </div>

</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <span><span class="dot" id="dot"></span><span id="statusTxt">READY</span></span>
  <span id="statusR">INVIDIOUS API</span>
</div>

<audio id="aud"></audio>

<script>
// ─────────── STATE ───────────
let instance = 'https://iv.melmac.space';
let queue    = [];   // array of video objects
let qIdx     = -1;   // current position in queue
let lastQ    = '';

const aud    = document.getElementById('aud');
const dot    = document.getElementById('dot');
const ppBtn  = document.getElementById('ppBtn');
const progFill = document.getElementById('progFill');

// ─────────── INSTANCE CHANGE ───────────
document.getElementById('instanceSel').addEventListener('change', e => {
  instance = e.target.value;
  setStatus('INSTANCE → ' + new URL(instance).hostname);
  if (lastQ) doSearch(lastQ);
});

// ─────────── SEARCH ───────────
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') triggerSearch(); });

function triggerSearch() {
  const v = document.getElementById('q').value.trim();
  if (v) doSearch(v);
}

async function doSearch(query) {
  lastQ = query;
  document.getElementById('q').value = query;

  const pane = document.getElementById('resultsPane');
  pane.innerHTML = `<div class="state-center"><div class="spinner"></div><p>SEARCHING "${query.toUpperCase()}"</p></div>`;
  setStatus('SEARCHING…', true);

  // Invidious search endpoint
  const url = `${instance}/api/v1/search?q=${encodeURIComponent(query)}&type=video&fields=videoId,title,author,lengthSeconds,videoThumbnails,viewCount`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} from ${new URL(instance).hostname}`);
    const items = await res.json();

    if (!Array.isArray(items) || items.length === 0) {
      pane.innerHTML = `<div class="state-center"><div class="state-icon">🔍</div><p>NO RESULTS FOR "${query.toUpperCase()}"</p></div>`;
      setStatus('NO RESULTS');
      return;
    }

    queue = items;
    setStatus(`${items.length} RESULTS`, false);
    renderList(items);
  } catch(err) {
    pane.innerHTML = `
      <div class="state-center">
        <div class="state-icon">⚠️</div>
        <div class="err-box">ERROR: ${escHtml(err.message)}<br><br>
          Try switching the instance in the top-right dropdown.<br>
          Some instances block external origins — others allow it.
        </div>
      </div>`;
    setStatus('ERROR', false);
  }
}

// ─────────── RENDER RESULTS ───────────
function renderList(items) {
  const pane = document.getElementById('resultsPane');

  let html = `<div class="pane-header">
    <span class="pane-title">RESULTS</span>
    <span class="pane-count">${items.length} TRACKS</span>
  </div><div class="track-list">`;

  items.forEach((v, i) => {
    const thumb = bestThumb(v.videoThumbnails);
    const dur   = fmtSecs(v.lengthSeconds);
    const views = fmtNum(v.viewCount);
    const cls   = i === qIdx ? ' playing' : '';
    html += `
      <div class="track-card${cls}" onclick="play(${i})" style="animation-delay:${Math.min(i,12)*0.025}s">
        <span class="t-num">${i + 1}</span>
        ${thumb
          ? `<img class="t-thumb" src="${thumb}" loading="lazy" onerror="this.outerHTML='<div class=t-thumb-ph>♪</div>'">`
          : `<div class="t-thumb-ph">♪</div>`}
        <div class="t-info">
          <div class="t-name">${escHtml(v.title)}</div>
          <div class="t-author">${escHtml(v.author || '')}</div>
        </div>
        <div class="t-meta">${dur}<br><span style="font-size:0.52rem;opacity:0.55">${views}</span></div>
      </div>`;
  });

  html += '</div>';
  pane.innerHTML = html;
  renderQueue();
}

// ─────────── PLAY ───────────
async function play(idx) {
  if (idx < 0 || idx >= queue.length) return;
  qIdx = idx;
  const v = queue[idx];

  // re-render to show playing state
  refreshPlayingState();
  renderQueue();

  setStatus(`LOADING: ${v.title?.slice(0,35)}…`, true);

  try {
    // Fetch stream info
    const res = await fetch(`${instance}/api/v1/videos/${v.videoId}?local=true&fields=adaptiveFormats,formatStreams,videoThumbnails,title,author`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Pick best audio-only stream (adaptiveFormats) → fallback to formatStreams (muxed)
    const audioOnly = (data.adaptiveFormats || [])
      .filter(f => f.type?.startsWith('audio/'))
      .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));

    const muxed = (data.formatStreams || [])
      .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));

    const stream = audioOnly[0] || muxed[0];
    if (!stream?.url) throw new Error('No playable stream found for this video.');

    aud.src = stream.url;
    aud.volume = parseFloat(document.getElementById('vol').value);
    await aud.play();

    // Update art panel
    const artThumb = bestThumb(data.videoThumbnails || v.videoThumbnails, 'medium');
    const artWrap  = document.getElementById('artWrap');
    artWrap.innerHTML = artThumb
      ? `<img src="${artThumb}" alt="">
         <div class="art-grad"></div>
         <div class="art-text">
           <div class="art-title">${escHtml(data.title || v.title)}</div>
           <div class="art-author">${escHtml(data.author || v.author || '')}</div>
         </div>`
      : `<div class="art-ph"><span>🎧</span><p>${escHtml((v.title||'').slice(0,28))}</p></div>`;

    document.title = `${v.title} — TUNED`;
    setStatus(`▶ ${v.title?.slice(0,50)}`, true);

  } catch(err) {
    setStatus(`STREAM ERROR: ${err.message}`, false);
    dot.classList.remove('live');
  }
}

function prevTrack() { if (qIdx > 0) play(qIdx - 1); }
function nextTrack() { if (qIdx < queue.length - 1) play(qIdx + 1); }
function skip(s)     { aud.currentTime = Math.max(0, Math.min((aud.duration||0), aud.currentTime + s)); }
function setVol(v)   { aud.volume = parseFloat(v); }

function togglePlay() {
  if (aud.paused) aud.play();
  else aud.pause();
}

function seek(e) {
  if (!aud.duration) return;
  const r = document.getElementById('progTrack').getBoundingClientRect();
  aud.currentTime = ((e.clientX - r.left) / r.width) * aud.duration;
}

// ─────────── AUDIO EVENTS ───────────
aud.addEventListener('play',  () => { ppBtn.textContent = '⏸'; dot.classList.add('live'); });
aud.addEventListener('pause', () => { ppBtn.textContent = '▶'; dot.classList.remove('live'); });
aud.addEventListener('ended', nextTrack);
aud.addEventListener('error', () => { setStatus('AUDIO ERROR — stream may have expired, click the track to retry', false); dot.classList.remove('live'); });

aud.addEventListener('timeupdate', () => {
  if (!aud.duration) return;
  const pct = (aud.currentTime / aud.duration) * 100;
  progFill.style.width = pct + '%';
  document.getElementById('tCur').textContent = fmtSecs(Math.floor(aud.currentTime));
  document.getElementById('tTot').textContent = fmtSecs(Math.floor(aud.duration));
});

// ─────────── QUEUE UI ───────────
function renderQueue() {
  const el = document.getElementById('queueList');
  if (!queue.length) {
    el.innerHTML = '<p style="font-family:\'DM Mono\',monospace;font-size:0.6rem;color:var(--muted);padding:4px 6px;letter-spacing:0.1em">EMPTY</p>';
    return;
  }
  el.innerHTML = queue.map((v, i) => {
    const thumb = bestThumb(v.videoThumbnails, 'tiny');
    return `<div class="q-item${i === qIdx ? ' active' : ''}" onclick="play(${i})">
      ${thumb
        ? `<img class="q-thumb" src="${thumb}" loading="lazy" onerror="this.outerHTML='<div class=q-thumb-ph>♪</div>'">`
        : `<div class="q-thumb-ph">♪</div>`}
      <div style="min-width:0">
        <div class="q-name">${escHtml(v.title || '')}</div>
        <div class="q-author">${escHtml(v.author || '')}</div>
      </div>
    </div>`;
  }).join('');
}

function refreshPlayingState() {
  document.querySelectorAll('.track-card').forEach((el, i) => {
    el.classList.toggle('playing', i === qIdx);
  });
}

// ─────────── HELPERS ───────────
function bestThumb(thumbs, prefer = 'medium') {
  if (!thumbs?.length) return null;
  const order = ['maxres','high','medium','default','tiny'];
  const pref  = prefer === 'tiny' ? ['tiny','default','medium','high','maxres'] : order;
  for (const q of pref) {
    const t = thumbs.find(t => t.quality === q);
    if (t?.url) return t.url;
  }
  return thumbs[0]?.url || null;
}

function fmtSecs(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function fmtNum(n) {
  if (!n) return '';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B views';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M views';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K views';
  return n + ' views';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(msg, active = false) {
  document.getElementById('statusTxt').textContent = msg;
  dot.classList.toggle('live', !!active);
  document.getElementById('statusR').textContent =
    new URL(instance).hostname + ' · ' +
    new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
</script>
</body>
</html>
